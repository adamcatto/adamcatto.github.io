name: Update Publications from Google Scholar

on:
  schedule:
    # Run every Sunday at 2:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allow manual triggering

jobs:
  update-publications:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Update citation counts only
        run: |
          python scripts/update_publications.py --update-citations-only

      - name: Commit and push if changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/content/publications/*.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update publication citation counts. Auto-updated by GitHub Actions workflow."
            git push
          fi
